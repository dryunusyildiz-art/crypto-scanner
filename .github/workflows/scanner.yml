name: crypto-scanner

# =============================================================================
#  GitHub Actions ile UCRETSIZ 7/24 tarama (PC gerekmez, kredi karti gerekmez)
#  Bu dosya repoda su yola konmali:  .github/workflows/scanner.yml
#  Kod zaten --once (tek tur) modunu destekledigi icin her calismada bir tarama
#  yapip uygun sinyalleri Telegram'a gonderir.
# =============================================================================

on:
  schedule:
    - cron: "*/15 * * * *"     # her 15 dakikada bir (UTC).
    # NOT: 15 dk -> ayda ~2880 calisma. PRIVATE repoda ucretsiz 2000 dk/ay
    # sinirini asabilir. Sinirsiz icin repo'yu PUBLIC yap (ve main.py'deki
    # gomulu token'i silip yalnizca Secret kullan). Saatte bir icin: "0 * * * *".
  workflow_dispatch:            # Actions sekmesinden ELLE calistirma butonu
    inputs:
      test_mode:
        description: "Test modu: esikleri gecici dusur, Telegram formatini gercek veriyle dogrula"
        required: false
        default: false
        type: boolean

# Ayni anda tek calisma olsun (onceki bitmeden yenisi baslamasin)
concurrency:
  group: crypto-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt

      # Cooldown durumunu (alerts_cache.json) calismalar arasi tasi -> ayni
      # sinyal her turda tekrar tekrar gonderilmesin.
      - name: Alarm cache'ini geri yukle
        uses: actions/cache@v4
        with:
          path: alerts_cache.json
          key: alerts-cache-${{ github.run_id }}
          restore-keys: |
            alerts-cache-

      - name: Taramayi calistir (tek tur)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EXCHANGE_NAME: binance
          MARKET_TYPE: spot
          TIMEFRAMES: "1h,4h,1d"
          # Swing trade modu: ayni coin+yon icin 6 saat cooldown, gereksiz
          # tekrar mesaj gelmesin (skor 10+ artarsa yine de guncelleme gelir).
          ALERT_COOLDOWN_MINUTES: "360"
          # "Run workflow" ile elle calistirirken test_mode kutusunu
          # isaretlerseniz esikler gecici duser -> gercek veriyle en az bir
          # Telegram mesaji (grafik+caption) garanti gelir. Zamanlanan (cron)
          # calismalarda bu girdi hic olmadigi icin daima "false" kalir.
          TEST_FORCE_LOW_THRESHOLD: "${{ github.event.inputs.test_mode || 'false' }}"
        run: python main.py --once
